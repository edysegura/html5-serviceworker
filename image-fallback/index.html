<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Fallback</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Image Fallback</h1>
    <figure>
      <img src="images/html5-logo.webp" alt="HTML5 Logo" />
      <figcaption>Image with fallback</figcaption>
    </figure>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
      }
    </script>
  </body>
</html>
